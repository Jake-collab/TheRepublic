openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: The Republic API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Website categories
  - name: websites
    description: Website directory
  - name: user
    description: User profile and membership
  - name: preferences
    description: User website preferences
  - name: citizen-vote
    description: Citizen Vote feed
  - name: support
    description: Support tickets
  - name: notifications
    description: User notifications
  - name: stripe
    description: Stripe webhooks
  - name: admin
    description: Admin panel operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Categories ──────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all active categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  # ── Websites ─────────────────────────────────────────────────────────────────
  /websites:
    get:
      operationId: listWebsites
      tags: [websites]
      summary: List websites
      parameters:
        - name: categoryId
          in: query
          schema:
            type: ["integer", "null"]
        - name: isFree
          in: query
          schema:
            type: ["boolean", "null"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Website"

  /websites/{id}:
    get:
      operationId: getWebsite
      tags: [websites]
      summary: Get a single website
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Website"
        "404":
          description: Not found

  # ── User ─────────────────────────────────────────────────────────────────────
  /user/profile:
    get:
      operationId: getUserProfile
      tags: [user]
      summary: Get current user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    patch:
      operationId: updateUserProfile
      tags: [user]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /user/membership:
    get:
      operationId: getUserMembership
      tags: [user]
      summary: Get user membership status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"
        "401":
          description: Unauthorized

  /user/membership/checkout:
    post:
      operationId: createCheckoutSession
      tags: [user]
      summary: Create Stripe checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"
        "401":
          description: Unauthorized

  /user/membership/portal:
    post:
      operationId: createPortalSession
      tags: [user]
      summary: Create Stripe customer portal session
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalSession"

  # ── User Preferences ─────────────────────────────────────────────────────────
  /user/prefs:
    get:
      operationId: getUserPrefs
      tags: [preferences]
      summary: Get all user website preferences
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebsitePref"
    post:
      operationId: upsertWebsitePref
      tags: [preferences]
      summary: Upsert a website preference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebsitePrefInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebsitePref"

  /user/prefs/reorder:
    post:
      operationId: reorderUserTabs
      tags: [preferences]
      summary: Reorder user website tabs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TabReorderInput"
      responses:
        "200":
          description: OK

  # ── Citizen Vote ──────────────────────────────────────────────────────────────
  /citizen-vote/posts:
    get:
      operationId: listCitizenVotePosts
      tags: [citizen-vote]
      summary: List citizen vote posts
      parameters:
        - name: category
          in: query
          schema:
            type: ["string", "null"]
        - name: geo
          in: query
          schema:
            type: ["string", "null"]
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, top]
            default: newest
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CitizenVotePostList"
    post:
      operationId: createCitizenVotePost
      tags: [citizen-vote]
      summary: Create a citizen vote post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CitizenVotePostInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CitizenVotePost"

  /citizen-vote/posts/{id}/upvote:
    post:
      operationId: upvoteCitizenVotePost
      tags: [citizen-vote]
      summary: Toggle upvote on a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpvoteResult"

  /citizen-vote/categories:
    get:
      operationId: listVoteCategories
      tags: [citizen-vote]
      summary: List vote categories and geo options
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteMetadata"

  # ── Support ───────────────────────────────────────────────────────────────────
  /support/tickets:
    get:
      operationId: listSupportTickets
      tags: [support]
      summary: List user support tickets
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportTicket"
    post:
      operationId: createSupportTicket
      tags: [support]
      summary: Create a support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportTicketInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"

  # ── Notifications ─────────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List user notifications
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: OK

  # ── Stripe Webhook ────────────────────────────────────────────────────────────
  /stripe/webhook:
    post:
      operationId: stripeWebhook
      tags: [stripe]
      summary: Stripe webhook handler
      responses:
        "200":
          description: OK

  # ── Admin: Categories ─────────────────────────────────────────────────────────
  /admin/categories:
    get:
      operationId: adminListCategories
      tags: [admin]
      summary: Admin list all categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: adminCreateCategory
      tags: [admin]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /admin/categories/{id}:
    patch:
      operationId: adminUpdateCategory
      tags: [admin]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /admin/categories/reorder:
    post:
      operationId: adminReorderCategories
      tags: [admin]
      summary: Reorder categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryReorderInput"
      responses:
        "200":
          description: OK

  # ── Admin: Websites ───────────────────────────────────────────────────────────
  /admin/websites:
    get:
      operationId: adminListWebsites
      tags: [admin]
      summary: Admin list all websites
      parameters:
        - name: categoryId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Website"
    post:
      operationId: adminCreateWebsite
      tags: [admin]
      summary: Create a website
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebsiteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Website"

  /admin/websites/{id}:
    patch:
      operationId: adminUpdateWebsite
      tags: [admin]
      summary: Update a website
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebsiteUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Website"

  # ── Admin: Users ──────────────────────────────────────────────────────────────
  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin list all users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserList"

  /admin/users/{userId}/membership:
    patch:
      operationId: adminUpdateUserMembership
      tags: [admin]
      summary: Update user membership
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembershipUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"

  # ── Admin: Support ────────────────────────────────────────────────────────────
  /admin/support/tickets:
    get:
      operationId: adminListSupportTickets
      tags: [admin]
      summary: Admin list all support tickets
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: type
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportTicket"

  /admin/support/tickets/{id}:
    patch:
      operationId: adminUpdateSupportTicket
      tags: [admin]
      summary: Update support ticket (reply, close)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportTicketAdminUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"

  # ── Admin: Stats ──────────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  # ── Admin: WebView Settings ───────────────────────────────────────────────────
  /admin/webview-settings:
    get:
      operationId: adminGetWebviewSettings
      tags: [admin]
      summary: Get global WebView settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebviewSettings"
    patch:
      operationId: adminUpdateWebviewSettings
      tags: [admin]
      summary: Update global WebView settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebviewSettingsUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebviewSettings"

  # ── Admin: Audit Logs ─────────────────────────────────────────────────────────
  /admin/audit-logs:
    get:
      operationId: adminListAuditLogs
      tags: [admin]
      summary: List audit logs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogList"

  # ── Admin: Notifications ──────────────────────────────────────────────────────
  /admin/notifications:
    post:
      operationId: adminSendNotification
      tags: [admin]
      summary: Send notification to user(s)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationInput"
      responses:
        "201":
          description: Created

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Category ────────────────────────────────────────────────────────────────
    Category:
      type: object
      required: [id, name, isActive, sortOrder]
      properties:
        id:
          type: integer
        name:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        sortOrder:
          type: integer

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    CategoryReorderInput:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items:
            type: integer

    # ── Website ──────────────────────────────────────────────────────────────────
    Website:
      type: object
      required: [id, name, url, displayDomain, isFree, isActive, categoryId, tabOrder, cardOrder]
      properties:
        id:
          type: integer
        name:
          type: string
        url:
          type: string
        displayDomain:
          type: string
        iconUrl:
          type: ["string", "null"]
        isFree:
          type: boolean
        isActive:
          type: boolean
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        tabOrder:
          type: integer
        cardOrder:
          type: integer
        canBeTab:
          type: boolean
        canPreload:
          type: boolean
        remembersUrl:
          type: boolean
        customUserAgent:
          type: ["string", "null"]
        injectedCss:
          type: ["string", "null"]
        injectedJs:
          type: ["string", "null"]
        appBannerHideSelectors:
          type: ["string", "null"]
        popupMitigationEnabled:
          type: boolean
        notes:
          type: ["string", "null"]

    WebsiteInput:
      type: object
      required: [name, url, displayDomain]
      properties:
        name:
          type: string
        url:
          type: string
        displayDomain:
          type: string
        iconUrl:
          type: ["string", "null"]
        isFree:
          type: boolean
        isActive:
          type: boolean
        categoryId:
          type: ["integer", "null"]
        tabOrder:
          type: integer
        cardOrder:
          type: integer
        canBeTab:
          type: boolean
        canPreload:
          type: boolean
        remembersUrl:
          type: boolean
        customUserAgent:
          type: ["string", "null"]
        injectedCss:
          type: ["string", "null"]
        injectedJs:
          type: ["string", "null"]
        appBannerHideSelectors:
          type: ["string", "null"]
        popupMitigationEnabled:
          type: boolean
        notes:
          type: ["string", "null"]

    WebsiteUpdate:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        displayDomain:
          type: string
        iconUrl:
          type: ["string", "null"]
        isFree:
          type: boolean
        isActive:
          type: boolean
        categoryId:
          type: ["integer", "null"]
        tabOrder:
          type: integer
        cardOrder:
          type: integer
        canBeTab:
          type: boolean
        canPreload:
          type: boolean
        remembersUrl:
          type: boolean
        customUserAgent:
          type: ["string", "null"]
        injectedCss:
          type: ["string", "null"]
        injectedJs:
          type: ["string", "null"]
        appBannerHideSelectors:
          type: ["string", "null"]
        popupMitigationEnabled:
          type: boolean
        notes:
          type: ["string", "null"]

    # ── User ─────────────────────────────────────────────────────────────────────
    UserProfile:
      type: object
      required: [id, email, displayName, isPro, acceptedTermsAt, acceptedPrivacyAt, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        isPro:
          type: boolean
        acceptedTermsAt:
          type: ["string", "null"]
        acceptedPrivacyAt:
          type: ["string", "null"]
        createdAt:
          type: string
        theme:
          type: string

    UserProfileUpdate:
      type: object
      properties:
        displayName:
          type: string
        theme:
          type: string
        acceptedTermsAt:
          type: ["string", "null"]
        acceptedPrivacyAt:
          type: ["string", "null"]

    # ── Membership ───────────────────────────────────────────────────────────────
    Membership:
      type: object
      required: [userId, plan, status]
      properties:
        userId:
          type: string
        plan:
          type: string
          enum: [free, monthly, annual]
        status:
          type: string
          enum: [active, canceled, past_due, none]
        stripeCustomerId:
          type: ["string", "null"]
        stripeSubscriptionId:
          type: ["string", "null"]
        currentPeriodEnd:
          type: ["string", "null"]

    MembershipUpdate:
      type: object
      properties:
        plan:
          type: string
        status:
          type: string

    CheckoutInput:
      type: object
      required: [plan]
      properties:
        plan:
          type: string
          enum: [monthly, annual]

    CheckoutSession:
      type: object
      required: [url]
      properties:
        url:
          type: string

    PortalSession:
      type: object
      required: [url]
      properties:
        url:
          type: string

    # ── User Website Preferences ─────────────────────────────────────────────────
    WebsitePref:
      type: object
      required: [id, userId, websiteId, tabOrder]
      properties:
        id:
          type: integer
        userId:
          type: string
        websiteId:
          type: integer
        tabColor:
          type: ["string", "null"]
        tabOrder:
          type: integer
        isPinned:
          type: boolean
        isVisible:
          type: boolean
        lastVisitedUrl:
          type: ["string", "null"]
        website:
          $ref: "#/components/schemas/Website"

    WebsitePrefInput:
      type: object
      required: [websiteId]
      properties:
        websiteId:
          type: integer
        tabColor:
          type: ["string", "null"]
        tabOrder:
          type: integer
        isPinned:
          type: boolean
        isVisible:
          type: boolean
        lastVisitedUrl:
          type: ["string", "null"]

    TabReorderInput:
      type: object
      required: [websiteIds]
      properties:
        websiteIds:
          type: array
          items:
            type: integer

    # ── Citizen Vote ─────────────────────────────────────────────────────────────
    CitizenVotePost:
      type: object
      required: [id, content, category, upvotes, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        displayName:
          type: string
        content:
          type: string
        category:
          type: string
        geo:
          type: ["string", "null"]
        isNational:
          type: boolean
        upvotes:
          type: integer
        hasUpvoted:
          type: boolean
        createdAt:
          type: string

    CitizenVotePostList:
      type: object
      required: [posts, total, page, limit]
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/CitizenVotePost"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    CitizenVotePostInput:
      type: object
      required: [content, category]
      properties:
        content:
          type: string
          maxLength: 500
        category:
          type: string
        geo:
          type: ["string", "null"]
        isNational:
          type: boolean

    UpvoteResult:
      type: object
      required: [upvotes, hasUpvoted]
      properties:
        upvotes:
          type: integer
        hasUpvoted:
          type: boolean

    VoteMetadata:
      type: object
      required: [categories, geoOptions]
      properties:
        categories:
          type: array
          items:
            type: string
        geoOptions:
          type: array
          items:
            type: string

    # ── Support ───────────────────────────────────────────────────────────────────
    SupportTicket:
      type: object
      required: [id, type, subject, message, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        userEmail:
          type: ["string", "null"]
        type:
          type: string
          enum: [support, bug, feature]
        subject:
          type: string
        message:
          type: string
        status:
          type: string
