openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: The Republic API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Website categories
  - name: websites
    description: Website directory
  - name: user
    description: User profile and membership
  - name: preferences
    description: User website preferences
  - name: citizen-vote
    description: Citizen Vote feed
  - name: talks
    description: Talks discussion boards
  - name: support
    description: Support tickets
  - name: notifications
    description: User notifications
  - name: stripe
    description: Stripe webhooks
  - name: admin
    description: Admin panel operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Categories ──────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all active categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  # ── Websites ─────────────────────────────────────────────────────────────────
  /websites:
    get:
      operationId: listWebsites
      tags: [websites]
      summary: List websites
      parameters:
        - name: categoryId
          in: query
          schema:
            type: ["integer", "null"]
        - name: isFree
          in: query
          schema:
            type: ["boolean", "null"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Website"

  /websites/{id}:
    get:
      operationId: getWebsite
      tags: [websites]
      summary: Get a single website
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Website"
        "404":
          description: Not found

  # ── User ─────────────────────────────────────────────────────────────────────
  /user/profile:
    get:
      operationId: getUserProfile
      tags: [user]
      summary: Get current user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    patch:
      operationId: updateUserProfile
      tags: [user]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /user/membership:
    get:
      operationId: getUserMembership
      tags: [user]
      summary: Get user membership status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"
        "401":
          description: Unauthorized

  /user/membership/checkout:
    post:
      operationId: createCheckoutSession
      tags: [user]
      summary: Create Stripe checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"
        "401":
          description: Unauthorized

  /user/membership/portal:
    post:
      operationId: createPortalSession
      tags: [user]
      summary: Create Stripe customer portal session
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalSession"

  # ── User Preferences ─────────────────────────────────────────────────────────
  /user/prefs:
    get:
      operationId: getUserPrefs
      tags: [preferences]
      summary: Get all user website preferences
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebsitePref"
    post:
      operationId: upsertWebsitePref
      tags: [preferences]
      summary: Upsert a website preference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebsitePrefInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebsitePref"

  /user/prefs/reorder:
    post:
      operationId: reorderUserTabs
      tags: [preferences]
      summary: Reorder user website tabs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TabReorderInput"
      responses:
        "200":
          description: OK

  # ── Citizen Vote ──────────────────────────────────────────────────────────────
  /citizen-vote/posts:
    get:
      operationId: listCitizenVotePosts
      tags: [citizen-vote]
      summary: List citizen vote posts
      parameters:
        - name: category
          in: query
          schema:
            type: ["string", "null"]
        - name: geo
          in: query
          schema:
            type: ["string", "null"]
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, top]
            default: newest
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CitizenVotePostList"
    post:
      operationId: createCitizenVotePost
      tags: [citizen-vote]
      summary: Create a citizen vote post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CitizenVotePostInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CitizenVotePost"

  /citizen-vote/posts/{id}/flag:
    post:
      operationId: flagCitizenVotePost
      tags: [citizen-vote]
      summary: Report/flag a citizen vote post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlagInput"
      responses:
        "201":
          description: Flagged

  /citizen-vote/posts/{id}/upvote:
    post:
      operationId: upvoteCitizenVotePost
      tags: [citizen-vote]
      summary: Toggle upvote on a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpvoteResult"

  /citizen-vote/categories:
    get:
      operationId: listVoteCategories
      tags: [citizen-vote]
      summary: List vote categories and geo options
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteMetadata"

  # ── Support ───────────────────────────────────────────────────────────────────
  /support/tickets:
    get:
      operationId: listSupportTickets
      tags: [support]
      summary: List user support tickets
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportTicket"
    post:
      operationId: createSupportTicket
      tags: [support]
      summary: Create a support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportTicketInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"

  # ── Notifications ─────────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List user notifications
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: OK

  # ── Membership Pricing (public) ───────────────────────────────────────────────
  /membership/pricing:
    get:
      operationId: getMembershipPricing
      tags: [user]
      summary: Get current membership pricing (no auth required)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipPricing"

  # ── Stripe Webhook ────────────────────────────────────────────────────────────
  /stripe/webhook:
    post:
      operationId: stripeWebhook
      tags: [stripe]
      summary: Stripe webhook handler
      responses:
        "200":
          description: OK

  # ── Admin: Categories ─────────────────────────────────────────────────────────
  /admin/categories:
    get:
      operationId: adminListCategories
      tags: [admin]
      summary: Admin list all categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: adminCreateCategory
      tags: [admin]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /admin/categories/{id}:
    patch:
      operationId: adminUpdateCategory
      tags: [admin]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /admin/categories/reorder:
    post:
      operationId: adminReorderCategories
      tags: [admin]
      summary: Reorder categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryReorderInput"
      responses:
        "200":
          description: OK

  # ── Admin: Websites ───────────────────────────────────────────────────────────
  /admin/websites:
    get:
      operationId: adminListWebsites
      tags: [admin]
      summary: Admin list all websites
      parameters:
        - name: categoryId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Website"
    post:
      operationId: adminCreateWebsite
      tags: [admin]
      summary: Create a website
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebsiteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Website"

  /admin/websites/{id}:
    patch:
      operationId: adminUpdateWebsite
      tags: [admin]
      summary: Update a website
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebsiteUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Website"

  # ── Admin: Users ──────────────────────────────────────────────────────────────
  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin list all users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserList"

  /admin/users/{userId}/membership:
    patch:
      operationId: adminUpdateUserMembership
      tags: [admin]
      summary: Update user membership
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembershipUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"

  /admin/users/export:
    get:
      operationId: adminExportUsers
      tags: [admin]
      summary: Export all users as CSV
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /admin/users/{userId}/ban:
    post:
      operationId: adminBanUser
      tags: [admin]
      summary: Ban a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BanRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}/unban:
    post:
      operationId: adminUnbanUser
      tags: [admin]
      summary: Unban a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}/activity:
    get:
      operationId: adminGetUserActivity
      tags: [admin]
      summary: Get a user's full activity history
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserActivity"

  # ── Admin: Stripe Settings ────────────────────────────────────────────────────
  /admin/stripe-settings:
    get:
      operationId: adminGetStripeSettings
      tags: [admin]
      summary: Get Stripe configuration (sensitive fields masked)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeSettings"
    put:
      operationId: adminUpdateStripeSettings
      tags: [admin]
      summary: Update Stripe configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripeSettingsUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeSettings"

  # ── Admin: Support ────────────────────────────────────────────────────────────
  /admin/support/tickets:
    get:
      operationId: adminListSupportTickets
      tags: [admin]
      summary: Admin list all support tickets
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: type
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportTicket"

  /admin/support/tickets/{id}:
    patch:
      operationId: adminUpdateSupportTicket
      tags: [admin]
      summary: Update support ticket (reply, status, priority)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportTicketAdminUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"

  /admin/support/tickets/{id}/send-email:
    post:
      operationId: adminSendTicketEmail
      tags: [admin]
      summary: Send admin reply to user via email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [sent]
                properties:
                  sent:
                    type: boolean
                  message:
                    type: string

  /admin/support/auto-close:
    post:
      operationId: adminAutoCloseTickets
      tags: [admin]
      summary: Auto-close resolved tickets older than N days
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoCloseRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoCloseResult"

  /admin/support/canned-responses:
    get:
      operationId: adminListCannedResponses
      tags: [admin]
      summary: List canned responses
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CannedResponse"
    post:
      operationId: adminCreateCannedResponse
      tags: [admin]
      summary: Create a canned response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CannedResponseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CannedResponse"

  /admin/support/canned-responses/{id}:
    patch:
      operationId: adminUpdateCannedResponse
      tags: [admin]
      summary: Update a canned response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CannedResponseInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CannedResponse"
    delete:
      operationId: adminDeleteCannedResponse
      tags: [admin]
      summary: Delete a canned response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Admin: Stats ──────────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  # ── Admin: WebView Settings ───────────────────────────────────────────────────
  /admin/webview-settings:
    get:
      operationId: adminGetWebviewSettings
      tags: [admin]
      summary: Get global WebView settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebviewSettings"
    patch:
      operationId: adminUpdateWebviewSettings
      tags: [admin]
      summary: Update global WebView settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebviewSettingsUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebviewSettings"

  # ── Admin: Audit Logs ─────────────────────────────────────────────────────────
  /admin/audit-logs:
    get:
      operationId: adminListAuditLogs
      tags: [admin]
      summary: List audit logs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogList"

  # ── Admin: Notifications ──────────────────────────────────────────────────────
  /admin/notifications:
    post:
      operationId: adminSendNotification
      tags: [admin]
      summary: Send notification to user(s)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationInput"
      responses:
        "201":
          description: Created

  # ── Admin: Talks/Discussions ─────────────────────────────────────────────────
  /admin/talks/categories:
    get:
      operationId: adminListTalkCategories
      tags: [admin]
      summary: Admin list all talk categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminTalkCategory"
    post:
      operationId: adminCreateTalkCategory
      tags: [admin]
      summary: Create a talk category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminTalkCategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTalkCategory"

  /admin/talks/categories/{id}:
    patch:
      operationId: adminUpdateTalkCategory
      tags: [admin]
      summary: Update a talk category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminTalkCategoryUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTalkCategory"
    delete:
      operationId: adminDeleteTalkCategory
      tags: [admin]
      summary: Delete a talk category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/talks/posts:
    get:
      operationId: adminListTalkPosts
      tags: [admin]
      summary: Admin list all talk posts
      parameters:
        - name: categoryId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: cursor
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTalkPostsPage"

  /admin/talks/posts/{id}:
    delete:
      operationId: adminDeleteTalkPost
      tags: [admin]
      summary: Delete a talk post (and its comments)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/talks/posts/{id}/pin:
    post:
      operationId: adminPinTalkPost
      tags: [admin]
      summary: Pin a talk post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
