components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Category ────────────────────────────────────────────────────────────────
    Category:
      type: object
      required: [id, name, isActive, sortOrder]
      properties:
        id:
          type: integer
        name:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        sortOrder:
          type: integer

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    CategoryReorderInput:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items:
            type: integer

    # ── Website ──────────────────────────────────────────────────────────────────
    Website:
      type: object
      required: [id, name, url, displayDomain, isFree, isActive, categoryId, tabOrder, cardOrder]
      properties:
        id:
          type: integer
        name:
          type: string
        url:
          type: string
        displayDomain:
          type: string
        iconUrl:
          type: ["string", "null"]
        isFree:
          type: boolean
        isActive:
          type: boolean
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        tabOrder:
          type: integer
        cardOrder:
          type: integer
        canBeTab:
          type: boolean
        canPreload:
          type: boolean
        remembersUrl:
          type: boolean
        customUserAgent:
          type: ["string", "null"]
        injectedCss:
          type: ["string", "null"]
        injectedJs:
          type: ["string", "null"]
        appBannerHideSelectors:
          type: ["string", "null"]
        popupMitigationEnabled:
          type: boolean
        notes:
          type: ["string", "null"]

    WebsiteInput:
      type: object
      required: [name, url, displayDomain]
      properties:
        name:
          type: string
        url:
          type: string
        displayDomain:
          type: string
        iconUrl:
          type: ["string", "null"]
        isFree:
          type: boolean
        isActive:
          type: boolean
        categoryId:
          type: ["integer", "null"]
        tabOrder:
          type: integer
        cardOrder:
          type: integer
        canBeTab:
          type: boolean
        canPreload:
          type: boolean
        remembersUrl:
          type: boolean
        customUserAgent:
          type: ["string", "null"]
        injectedCss:
          type: ["string", "null"]
        injectedJs:
          type: ["string", "null"]
        appBannerHideSelectors:
          type: ["string", "null"]
        popupMitigationEnabled:
          type: boolean
        notes:
          type: ["string", "null"]

    WebsiteUpdate:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        displayDomain:
          type: string
        iconUrl:
          type: ["string", "null"]
        isFree:
          type: boolean
        isActive:
          type: boolean
        categoryId:
          type: ["integer", "null"]
        tabOrder:
          type: integer
        cardOrder:
          type: integer
        canBeTab:
          type: boolean
        canPreload:
          type: boolean
        remembersUrl:
          type: boolean
        customUserAgent:
          type: ["string", "null"]
        injectedCss:
          type: ["string", "null"]
        injectedJs:
          type: ["string", "null"]
        appBannerHideSelectors:
          type: ["string", "null"]
        popupMitigationEnabled:
          type: boolean
        notes:
          type: ["string", "null"]

    # ── User ─────────────────────────────────────────────────────────────────────
    UserProfile:
      type: object
      required: [id, email, displayName, isPro, acceptedTermsAt, acceptedPrivacyAt, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        isPro:
          type: boolean
        acceptedTermsAt:
          type: ["string", "null"]
        acceptedPrivacyAt:
          type: ["string", "null"]
        createdAt:
          type: string
        theme:
          type: string

    UserProfileUpdate:
      type: object
      properties:
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        theme:
          type: string
        acceptedTermsAt:
          type: ["string", "null"]
        acceptedPrivacyAt:
          type: ["string", "null"]

    # ── Membership ───────────────────────────────────────────────────────────────
    Membership:
      type: object
      required: [userId, plan, status]
      properties:
        userId:
          type: string
        plan:
          type: string
          enum: [free, monthly, annual]
        status:
          type: string
          enum: [active, canceled, past_due, none]
        stripeCustomerId:
          type: ["string", "null"]
        stripeSubscriptionId:
          type: ["string", "null"]
        currentPeriodEnd:
          type: ["string", "null"]

    MembershipUpdate:
      type: object
      properties:
        plan:
          type: string
        status:
          type: string

    CheckoutInput:
      type: object
      required: [plan]
      properties:
        plan:
          type: string
          enum: [monthly, annual]

    CheckoutSession:
      type: object
      required: [url]
      properties:
        url:
          type: string

    PortalSession:
      type: object
      required: [url]
      properties:
        url:
          type: string

    MembershipPricing:
      type: object
      required: [monthlyPriceCents, annualPriceCents]
      properties:
        monthlyPriceCents:
          type: integer
        annualPriceCents:
          type: integer

    StripeSettings:
      type: object
      required: [secretKeyConfigured, webhookSecretConfigured, monthlyPriceCents, annualPriceCents]
      properties:
        secretKeyConfigured:
          type: boolean
        webhookSecretConfigured:
          type: boolean
        monthlyPriceId:
          type: ["string", "null"]
        annualPriceId:
          type: ["string", "null"]
        monthlyPriceCents:
          type: integer
        annualPriceCents:
          type: integer
        updatedAt:
          type: string

    StripeSettingsUpdate:
      type: object
      properties:
        secretKey:
          type: ["string", "null"]
        webhookSecret:
          type: ["string", "null"]
        monthlyPriceId:
          type: string
        annualPriceId:
          type: string
        monthlyPriceCents:
          type: integer
        annualPriceCents:
          type: integer

    # ── User Website Preferences ─────────────────────────────────────────────────
    WebsitePref:
      type: object
      required: [id, userId, websiteId, tabOrder]
      properties:
        id:
          type: integer
        userId:
          type: string
        websiteId:
          type: integer
        tabColor:
          type: ["string", "null"]
        tabOrder:
          type: integer
        isPinned:
          type: boolean
        isVisible:
          type: boolean
        lastVisitedUrl:
          type: ["string", "null"]
        website:
          $ref: "#/components/schemas/Website"

    WebsitePrefInput:
      type: object
      required: [websiteId]
      properties:
        websiteId:
          type: integer
        tabColor:
          type: ["string", "null"]
        tabOrder:
          type: integer
        isPinned:
          type: boolean
        isVisible:
          type: boolean
        lastVisitedUrl:
          type: ["string", "null"]

    TabReorderInput:
      type: object
      required: [websiteIds]
      properties:
        websiteIds:
          type: array
          items:
            type: integer

    # ── Citizen Vote ─────────────────────────────────────────────────────────────
    CitizenVotePost:
      type: object
      required: [id, content, category, upvotes, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        displayName:
          type: string
        content:
          type: string
        category:
          type: string
        geo:
          type: ["string", "null"]
        isNational:
          type: boolean
        upvotes:
          type: integer
        hasUpvoted:
          type: boolean
        isPinned:
          type: boolean
        createdAt:
          type: string

    CitizenVotePostList:
      type: object
      required: [posts, total, page, limit]
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/CitizenVotePost"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    CitizenVotePostInput:
      type: object
      required: [content, category]
      properties:
        content:
          type: string
          maxLength: 500
        category:
          type: string
        geo:
          type: ["string", "null"]
        isNational:
          type: boolean

    UpvoteResult:
      type: object
      required: [upvotes, hasUpvoted]
      properties:
        upvotes:
          type: integer
        hasUpvoted:
          type: boolean

    VoteMetadata:
      type: object
      required: [categories, geoOptions]
      properties:
        categories:
          type: array
          items:
            type: string
        geoOptions:
          type: array
          items:
            type: string

    # ── Support ───────────────────────────────────────────────────────────────────
    SupportTicket:
      type: object
      required: [id, type, subject, message, status, priority, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: ["string", "null"]
        userEmail:
          type: ["string", "null"]
        type:
          type: string
          enum: [support, bug, feature]
        subject:
          type: string
        message:
          type: string
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
        priority:
          type: string
          enum: [low, medium, high, critical]
        adminReply:
          type: ["string", "null"]
        emailedAt:
          type: ["string", "null"]
        assignedTo:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    SupportTicketInput:
      type: object
      required: [type, subject, message]
      properties:
        type:
          type: string
          enum: [support, bug, feature]
        subject:
          type: string
        message:
          type: string

